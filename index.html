<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Budget</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SPLASH / HEADER -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-top">
        <h1 class="app-title">Budget<span class="dot">.</span></h1>
        <button class="icon-btn" id="openAddBtn" aria-label="Add expense">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="balance-block">
        <span class="balance-label">Total Spent</span>
        <span class="balance-amount" id="totalDisplay">$0.00</span>
        <span class="balance-sub" id="monthLabel"></span>
      </div>
    </div>
  </header>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="expenses">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Expenses
    </button>
    <button class="tab-btn" data-tab="stats">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Stats
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- EXPENSES TAB -->
    <section id="tab-expenses" class="tab-panel active">
      <div class="filter-row">
        <select id="monthFilter" class="filter-select"></select>
        <button class="chip-btn active" data-filter="all">All</button>
        <button class="chip-btn" data-filter="week">This Week</button>
      </div>
      <div id="expenseList" class="expense-list">
        <div class="empty-state">
          <div class="empty-icon">🪙</div>
          <p>No expenses yet.<br/>Tap <strong>+</strong> to add one.</p>
        </div>
      </div>
    </section>

    <!-- STATS TAB -->
    <section id="tab-stats" class="tab-panel">
      <div class="stats-grid">
        <div class="stat-card accent">
          <span class="stat-label">Total Spent</span>
          <span class="stat-value" id="statTotal">$0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Entries</span>
          <span class="stat-value" id="statCount">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Avg / Entry</span>
          <span class="stat-value" id="statAvg">$0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Biggest</span>
          <span class="stat-value" id="statMax">$0.00</span>
        </div>
      </div>

      <h2 class="section-heading">By Category</h2>
      <div id="categoryBars" class="category-bars"></div>

      <h2 class="section-heading">Spending Over Time</h2>
      <div class="chart-wrap">
        <canvas id="lineChart"></canvas>
      </div>
    </section>

  </main>

  <!-- ADD EXPENSE MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="addModal">
      <div class="modal-header">
        <h2 class="modal-title">New Expense</h2>
        <button class="icon-btn close-btn" id="closeModalBtn" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" type="text" id="expTitle" placeholder="e.g. Grocery run" autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label">Amount ($)</label>
        <input class="form-input amount-input" type="number" id="expAmount" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
      </div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="expDate" />
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="category-grid" id="categoryGrid"></div>
      </div>

      <button class="save-btn" id="saveBtn">Save Expense</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
